<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hello World App</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            padding: 40px;
            max-width: 500px;
            width: 100%;
            text-align: center;
        }

        h1 {
            color: #333;
            margin-bottom: 30px;
            font-size: 28px;
        }

        .section {
            margin-bottom: 40px;
            padding-bottom: 30px;
            border-bottom: 2px solid #e0e0e0;
        }

        .section:last-child {
            border-bottom: none;
        }

        h2 {
            color: #666;
            font-size: 18px;
            margin-bottom: 15px;
            font-weight: 600;
        }

        .button-group {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
        }

        button {
            background-color: #667eea;
            color: white;
            border: none;
            padding: 12px 30px;
            font-size: 16px;
            border-radius: 6px;
            cursor: pointer;
            transition: background-color 0.3s ease;
            font-weight: 600;
        }

        button:hover:not(:disabled) {
            background-color: #5568d3;
        }

        button:disabled {
            background-color: #ccc;
            cursor: not-allowed;
        }

        .record-btn {
            background-color: #ef5350;
            flex: 1;
        }

        .record-btn:hover:not(:disabled) {
            background-color: #e53935;
        }

        .record-btn.stop-btn {
            background-color: #ffa726;
        }

        .record-btn.stop-btn:hover:not(:disabled) {
            background-color: #fb8c00;
        }

        .response {
            margin-top: 30px;
            padding: 20px;
            background-color: #f5f5f5;
            border-radius: 8px;
            display: none;
        }

        .response.show {
            display: block;
        }

        .message {
            font-size: 18px;
            color: #333;
            font-weight: 500;
        }

        .error {
            color: #d32f2f;
            background-color: #ffebee;
            border-left: 4px solid #d32f2f;
        }

        .success {
            color: #388e3c;
            background-color: #e8f5e9;
            border-left: 4px solid #388e3c;
        }

        .loading {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid #f3f3f3;
            border-top: 3px solid #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-right: 10px;
            vertical-align: middle;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .loading-text {
            display: inline-block;
            vertical-align: middle;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Hello World App</h1>
        
        <!-- Fetch Message Section -->
        <div class="section">
            <h2>API Test</h2>
            <button id="fetchBtn">Fetch Message</button>
            <div id="response" class="response">
                <div id="message" class="message"></div>
            </div>
        </div>

        <!-- Audio Recording Section -->
        <div class="section">
            <h2>Audio Recorder</h2>
            <div class="button-group">
                <button id="startRecordBtn" class="record-btn">Start Recording</button>
                <button id="stopRecordBtn" class="record-btn stop-btn" disabled>Stop Recording</button>
            </div>
            <div id="recordingStatus" class="response">
                <div id="recordingMessage" class="message"></div>
            </div>
        </div>
    </div>

    <script>
        const fetchBtn = document.getElementById('fetchBtn');
        const responseDiv = document.getElementById('response');
        const messageDiv = document.getElementById('message');
        const startRecordBtn = document.getElementById('startRecordBtn');
        const stopRecordBtn = document.getElementById('stopRecordBtn');
        const recordingStatusDiv = document.getElementById('recordingStatus');
        const recordingMessageDiv = document.getElementById('recordingMessage');
        const API_URL = 'http://localhost:8000';

        /**
         * Fetches the hello world message from the FastAPI backend
         */
        async function fetchHelloWorld() {
            try {
                // Disable button and show loading state
                fetchBtn.disabled = true;
                fetchBtn.innerHTML = '<span class="loading"></span><span class="loading-text">Loading...</span>';

                // Make API request
                const response = await fetch(`${API_URL}/`, {
                    method: 'GET',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                });

                // Check if response is ok
                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }

                // Parse JSON response
                const data = await response.json();

                // Display success message
                responseDiv.classList.add('show', 'success');
                messageDiv.textContent = `✓ ${data.message}`;

            } catch (error) {
                // Handle errors
                console.error('Error:', error);
                responseDiv.classList.add('show', 'error');
                messageDiv.textContent = `✗ Error: ${error.message}. Make sure the FastAPI server is running on http://localhost:8000`;

            } finally {
                // Re-enable button and restore text
                fetchBtn.disabled = false;
                fetchBtn.innerHTML = 'Fetch Message';
            }
        }

        /**
         * Starts audio recording on the backend
         */
        async function startRecording() {
            try {
                startRecordBtn.disabled = true;
                recordingStatusDiv.classList.remove('error', 'success');
                recordingStatusDiv.classList.add('show');
                recordingMessageDiv.textContent = 'Starting recording...';

                const response = await fetch(`${API_URL}/start-recording`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                });

                const data = await response.json();

                if (!response.ok) {
                    throw new Error(data.message || 'Failed to start recording');
                }

                recordingStatusDiv.classList.add('success');
                recordingMessageDiv.textContent = '🔴 Recording... (click Stop to finish)';
                stopRecordBtn.disabled = false;

            } catch (error) {
                console.error('Error:', error);
                recordingStatusDiv.classList.add('error');
                recordingMessageDiv.textContent = `✗ Error: ${error.message}`;
                startRecordBtn.disabled = false;
            }
        }

        /**
         * Stops audio recording and saves the file
         */
        async function stopRecording() {
            try {
                stopRecordBtn.disabled = true;
                recordingMessageDiv.textContent = 'Stopping recording and saving file...';

                const response = await fetch(`${API_URL}/stop-recording`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                });

                const data = await response.json();

                if (!response.ok) {
                    throw new Error(data.message || 'Failed to stop recording');
                }

                recordingStatusDiv.classList.remove('error');
                recordingStatusDiv.classList.add('success');
                recordingMessageDiv.textContent = `✓ Recording saved: ${data.filename}`;
                startRecordBtn.disabled = false;

            } catch (error) {
                console.error('Error:', error);
                recordingStatusDiv.classList.add('error');
                recordingStatusDiv.classList.remove('success');
                recordingMessageDiv.textContent = `✗ Error: ${error.message}`;
                startRecordBtn.disabled = false;
                stopRecordBtn.disabled = false;
            }
        }

        // Add event listeners
        fetchBtn.addEventListener('click', fetchHelloWorld);
        startRecordBtn.addEventListener('click', startRecording);
        stopRecordBtn.addEventListener('click', stopRecording);
    </script>
</body>
</html>
