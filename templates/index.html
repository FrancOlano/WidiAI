<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hello World App</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            padding: 40px;
            max-width: 500px;
            width: 100%;
            text-align: center;
        }

        h1 {
            color: #333;
            margin-bottom: 30px;
            font-size: 28px;
        }

        button {
            background-color: #667eea;
            color: white;
            border: none;
            padding: 12px 30px;
            font-size: 16px;
            border-radius: 6px;
            cursor: pointer;
            transition: background-color 0.3s ease;
            font-weight: 600;
        }

        button:hover {
            background-color: #5568d3;
        }

        button:disabled {
            background-color: #ccc;
            cursor: not-allowed;
        }

        .response {
            margin-top: 30px;
            padding: 20px;
            background-color: #f5f5f5;
            border-radius: 8px;
            display: none;
        }

        .response.show {
            display: block;
        }

        .message {
            font-size: 18px;
            color: #333;
            font-weight: 500;
        }

        .error {
            color: #d32f2f;
            background-color: #ffebee;
            border-left: 4px solid #d32f2f;
        }

        .success {
            color: #388e3c;
            background-color: #e8f5e9;
            border-left: 4px solid #388e3c;
        }

        .loading {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid #f3f3f3;
            border-top: 3px solid #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-right: 10px;
            vertical-align: middle;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .loading-text {
            display: inline-block;
            vertical-align: middle;
        }

        .midi-controls {
            margin-top: 24px;
            display: flex;
            gap: 10px;
            justify-content: center;
        }

        .midi-controls button {
            min-width: 90px;
        }

    </style>
</head>
<body>
    <div class="container">
        <h1>Hello World App</h1>
        <button id="fetchBtn">Fetch Message</button>
        <div id="response" class="response">
            <div id="message" class="message"></div>
        </div>

        <div class="midi-controls">
            <button id="playBtn" type="button" aria-label="Play" title="Play">&#9654;</button>
            <button id="pauseBtn" type="button" aria-label="Pause" title="Pause">&#10074;&#10074;</button>
            <button id="stopBtn" type="button" aria-label="Stop" title="Stop">&#9632;</button>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/tone@14.7.77/build/Tone.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tonejs/midi@2.0.28/build/Midi.min.js"></script>

    <script>
        const fetchBtn = document.getElementById('fetchBtn');
        const playBtn = document.getElementById('playBtn');
        const pauseBtn = document.getElementById('pauseBtn');
        const stopBtn = document.getElementById('stopBtn');
        const responseDiv = document.getElementById('response');
        const messageDiv = document.getElementById('message');
        const API_URL = 'http://localhost:8000';
        const MIDI_URL = '/static/converted.mid';

        let midiData = null;
        let synths = [];

        function clearSynths() {
            synths.forEach((synth) => synth.dispose());
            synths = [];
        }

        async function loadMidiForPlayback() {
            if (midiData) {
                return;
            }

            const response = await fetch(MIDI_URL);
            if (!response.ok) {
                throw new Error(`Could not load MIDI file at ${MIDI_URL}`);
            }

            const midiBuffer = await response.arrayBuffer();
            midiData = new Midi(midiBuffer);

            Tone.Transport.stop();
            Tone.Transport.cancel();
            Tone.Transport.position = 0;
            clearSynths();

            const bpm = midiData.header.tempos[0]?.bpm || 120;
            Tone.Transport.bpm.value = bpm;

            midiData.tracks.forEach((track) => {
                const synth = new Tone.PolySynth(Tone.Synth).toDestination();
                synths.push(synth);

                track.notes.forEach((note) => {
                    Tone.Transport.schedule((time) => {
                        synth.triggerAttackRelease(
                            note.name,
                            note.duration,
                            time,
                            note.velocity
                        );
                    }, note.time);
                });
            });
        }

        async function playMidi() {
            try {
                await Tone.start();
                await loadMidiForPlayback();
                Tone.Transport.start();
            } catch (error) {
                console.error('MIDI play error:', error);
            }
        }

        function pauseMidi() {
            Tone.Transport.pause();
        }

        function stopMidi() {
            Tone.Transport.stop();
            Tone.Transport.position = 0;
        }

        /**
         * Fetches the hello world message from the FastAPI backend
         */
        async function fetchHelloWorld() {
            try {
                // Disable button and show loading state
                fetchBtn.disabled = true;
                fetchBtn.innerHTML = '<span class="loading"></span><span class="loading-text">Loading...</span>';

                // Make API request
                const response = await fetch(`${API_URL}/`, {
                    method: 'GET',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                });

                // Check if response is ok
                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }

                // Parse JSON response
                const data = await response.json();

                // Display success message
                responseDiv.classList.add('show', 'success');
                messageDiv.textContent = `✓ ${data.message}`;

            } catch (error) {
                // Handle errors
                console.error('Error:', error);
                responseDiv.classList.add('show', 'error');
                messageDiv.textContent = `✗ Error: ${error.message}. Make sure the FastAPI server is running on http://localhost:8000`;

            } finally {
                // Re-enable button and restore text
                fetchBtn.disabled = false;
                fetchBtn.innerHTML = 'Fetch Message';
            }
        }

        // Add event listener to button
        fetchBtn.addEventListener('click', fetchHelloWorld);
        playBtn.addEventListener('click', playMidi);
        pauseBtn.addEventListener('click', pauseMidi);
        stopBtn.addEventListener('click', stopMidi);
    </script>
</body>
</html>
