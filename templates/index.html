<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hello World App</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            padding: 40px;
            max-width: 500px;
            width: 100%;
            text-align: center;
        }

        h1 {
            color: #333;
            margin-bottom: 30px;
            font-size: 28px;
        }

        .section {
            margin-bottom: 40px;
            padding-bottom: 30px;
            border-bottom: 2px solid #e0e0e0;
        }

        .section:last-child {
            border-bottom: none;
        }

        h2 {
            color: #666;
            font-size: 18px;
            margin-bottom: 15px;
            font-weight: 600;
        }

        .button-group {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
        }

        button {
            background-color: #667eea;
            color: white;
            border: none;
            padding: 12px 30px;
            font-size: 16px;
            border-radius: 6px;
            cursor: pointer;
            transition: background-color 0.3s ease;
            font-weight: 600;
        }

        button:hover:not(:disabled) {
            background-color: #5568d3;
        }

        button:disabled {
            background-color: #ccc;
            cursor: not-allowed;
        }

        .record-btn {
            background-color: #ef5350;
            flex: 1;
        }

        .record-btn:hover:not(:disabled) {
            background-color: #e53935;
        }

        .record-btn.stop-btn {
            background-color: #ffa726;
        }

        .record-btn.stop-btn:hover:not(:disabled) {
            background-color: #fb8c00;
        }

        .response {
            margin-top: 30px;
            padding: 20px;
            background-color: #f5f5f5;
            border-radius: 8px;
            display: none;
        }

        .response.show {
            display: block;
        }

        .message {
            font-size: 18px;
            color: #333;
            font-weight: 500;
        }

        .error {
            color: #d32f2f;
            background-color: #ffebee;
            border-left: 4px solid #d32f2f;
        }

        .success {
            color: #388e3c;
            background-color: #e8f5e9;
            border-left: 4px solid #388e3c;
        }

        .loading {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid #f3f3f3;
            border-top: 3px solid #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-right: 10px;
            vertical-align: middle;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .loading-text {
            display: inline-block;
            vertical-align: middle;
        }

        .model-selector-container {
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            gap: 8px;
            max-width: 300px;
            margin: 0 auto;
            text-align: left;
        }

        .model-selector-container label {
            color: #555;
            font-size: 14px;
            font-weight: 600;
        }

        .model-selector-container select {
            width: 100%;
            padding: 10px 12px;
            border: 2px solid #d9d9e8;
            border-radius: 8px;
            font-size: 15px;
            color: #333;
            background-color: #fff;
            cursor: pointer;
        }

        .model-selector-container select:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.2);
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Hello World App</h1>
        
        <!-- Fetch Message Section -->
        <div class="section">
            <h2>API Test</h2>
            <button id="fetchBtn">Fetch Message</button>
            <div id="response" class="response">
                <div id="message" class="message"></div>
            </div>
        </div>

        <!-- Audio Recording Section -->
        <div class="section">
            <h2>Audio Recorder</h2>
            <div class="recording-container">
                <button id="recordBtn" class="record-button">
                    <div class="record-button-dot"></div>
                </button>
                <canvas id="waveformCanvas" width="120" height="120"></canvas>
            </div>
            <div id="recordingStatus" class="response">
                <div id="recordingMessage" class="message"></div>
            </div>
        </div>

        <!-- Model Selector Section -->
        <div class="section">
            <h2>Model Selector</h2>
            <div class="model-selector-container">
                <label for="modelSelect">Transcription Model</label>
                <select id="modelSelect" name="model">
                    {% for model in transcription_models %}
                    <option value="{{ model.value }}" {% if model.value == default_transcription_model %}selected{% endif %}>
                        {{ model.label }}
                    </option>
                    {% endfor %}
                </select>
            </div>
        </div>

        <div class="midi-controls">
            <button id="playBtn" type="button" aria-label="Play" title="Play">&#9654;</button>
            <button id="pauseBtn" type="button" aria-label="Pause" title="Pause">&#10074;&#10074;</button>
            <button id="stopBtn" type="button" aria-label="Stop" title="Stop">&#9632;</button>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/tone@14.7.77/build/Tone.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tonejs/midi@2.0.28/build/Midi.min.js"></script>

    <script>
        const fetchBtn = document.getElementById('fetchBtn');
        const playBtn = document.getElementById('playBtn');
        const pauseBtn = document.getElementById('pauseBtn');
        const stopBtn = document.getElementById('stopBtn');
        const responseDiv = document.getElementById('response');
        const messageDiv = document.getElementById('message');
        const recordBtn = document.getElementById('recordBtn');
        const canvas = document.getElementById('waveformCanvas');
        const canvasCtx = canvas.getContext('2d');
        const modelSelect = document.getElementById('modelSelect');
        const recordingStatusDiv = document.getElementById('recordingStatus');
        const recordingMessageDiv = document.getElementById('recordingMessage');
        const API_URL = 'http://localhost:8000';
        let selectedModel = modelSelect.value;

        // Expose selected model for the transcribe flow integration
        window.selectedModel = selectedModel;

        modelSelect.addEventListener('change', (event) => {
            selectedModel = event.target.value;
            window.selectedModel = selectedModel;
        });

        /**
         * Fetches the hello world message from the FastAPI backend
         */
        async function fetchHelloWorld() {
            try {
                // Disable button and show loading state
                fetchBtn.disabled = true;
                fetchBtn.innerHTML = '<span class="loading"></span><span class="loading-text">Loading...</span>';

                // Make API request
                const response = await fetch(`${API_URL}/`, {
                    method: 'GET',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                });

                // Check if response is ok
                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }

                // Parse JSON response
                const data = await response.json();

                // Display success message
                responseDiv.classList.add('show', 'success');
                messageDiv.textContent = `✓ ${data.message}`;

            } catch (error) {
                // Handle errors
                console.error('Error:', error);
                responseDiv.classList.add('show', 'error');
                messageDiv.textContent = `✗ Error: ${error.message}. Make sure the FastAPI server is running on http://localhost:8000`;

            } finally {
                // Re-enable button and restore text
                fetchBtn.disabled = false;
                fetchBtn.innerHTML = 'Fetch Message';
            }
        }

        /**
         * Initializes the Web Audio API for waveform visualization
         */
        async function initializeAudioContext() {
            if (audioContext) return;

            audioContext = new (window.AudioContext || window.webkitAudioContext)();
            analyser = audioContext.createAnalyser();
            analyser.fftSize = 256;

            try {
                mediaStream = await navigator.mediaDevices.getUserMedia({ audio: true });
                const source = audioContext.createMediaStreamSource(mediaStream);
                source.connect(analyser);
            } catch (error) {
                console.error('Error accessing microphone:', error);
                recordingStatusDiv.classList.add('show', 'error');
                recordingMessageDiv.textContent = '✗ Microphone access denied';
                isRecording = false;
                recordBtn.classList.remove('recording');
                throw error;
            }
        }

        /**
         * Draws the waveform on the circular canvas
         */
        function drawWaveform() {
            if (!analyser) return;

            const bufferLength = analyser.frequencyBinCount;
            const dataArray = new Uint8Array(bufferLength);
            analyser.getByteFrequencyData(dataArray);

            // Calculate average amplitude
            let sum = 0;
            for (let i = 0; i < bufferLength; i++) {
                sum += dataArray[i];
            }
            const average = sum / bufferLength;

            // Add to history
            waveformHistory.push(average);
            if (waveformHistory.length > MAX_HISTORY) {
                waveformHistory.shift();
            }

            // Clear canvas
            canvasCtx.fillStyle = '#1a1a1a';
            canvasCtx.fillRect(0, 0, canvas.width, canvas.height);

            // Draw scrolling waveform bars
            const barWidth = Math.max(1, canvas.width / MAX_HISTORY);
            const barGap = 1;
            const maxBarHeight = canvas.height * 0.85;
            const centerY = canvas.height / 2;

            waveformHistory.forEach((level, index) => {
                const barHeight = (level / 255) * maxBarHeight;
                const x = (index / MAX_HISTORY) * canvas.width;
                const barY = centerY - barHeight / 2;

                // Create gradient for each bar
                const gradient = canvasCtx.createLinearGradient(x, barY, x, barY + barHeight);
                gradient.addColorStop(0, '#667eea');
                gradient.addColorStop(1, '#764ba2');

                // Add fade effect on left side
                const alpha = index / MAX_HISTORY;
                canvasCtx.globalAlpha = Math.max(0.3, alpha);
                canvasCtx.fillStyle = gradient;
                canvasCtx.fillRect(x, barY, barWidth - barGap, barHeight);
                canvasCtx.globalAlpha = 1;
            });

            if (isRecording) {
                animationId = requestAnimationFrame(drawWaveform);
            }
        }

        /**
         * Toggles recording on/off
         */
        async function toggleRecording() {
            if (!isRecording) {
                // Start recording
                try {
                    recordBtn.disabled = true;
                    recordingStatusDiv.classList.remove('error', 'success');
                    recordingStatusDiv.classList.add('show');
                    recordingMessageDiv.textContent = 'Starting recording...';

                    // Initialize audio context
                    await initializeAudioContext();

                    // Start backend recording
                    const response = await fetch(`${API_URL}/start-recording`, {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                        },
                    });

                    const data = await response.json();

                    if (!response.ok) {
                        throw new Error(data.message || 'Failed to start recording');
                    }

                    isRecording = true;
                    recordBtn.style.display = 'none';
                    canvas.classList.add('show');
                    recordBtn.disabled = false;
                    recordingStatusDiv.classList.add('success');
                    recordingMessageDiv.textContent = '🔴 Recording... (click to stop)';
                    waveformHistory = [];

                    // Start waveform animation
                    drawWaveform();

                } catch (error) {
                    console.error('Error:', error);
                    recordingStatusDiv.classList.add('error');
                    recordingMessageDiv.textContent = `✗ Error: ${error.message}`;
                    recordBtn.disabled = false;
                    isRecording = false;
                }

            } else {
                // Stop recording
                try {
                    recordBtn.disabled = true;
                    recordingMessageDiv.textContent = 'Stopping recording and saving file...';

                    // Stop waveform animation
                    if (animationId) {
                        cancelAnimationFrame(animationId);
                        animationId = null;
                    }

                    // Stop backend recording
                    const response = await fetch(`${API_URL}/stop-recording`, {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                        },
                    });

                    const data = await response.json();

                    if (!response.ok) {
                        throw new Error(data.message || 'Failed to stop recording');
                    }

                    isRecording = false;
                    canvas.classList.remove('show');
                    recordBtn.style.display = 'flex';
                    recordingStatusDiv.classList.remove('error');
                    recordingStatusDiv.classList.add('success');
                    recordingMessageDiv.textContent = `✓ Recording saved: ${data.filename}`;
                    recordBtn.disabled = false;

                    // Clean up audio context
                    if (mediaStream) {
                        mediaStream.getTracks().forEach(track => track.stop());
                    }

                } catch (error) {
                    console.error('Error:', error);
                    recordingStatusDiv.classList.add('error');
                    recordingStatusDiv.classList.remove('success');
                    recordingMessageDiv.textContent = `✗ Error: ${error.message}`;
                    isRecording = false;
                    canvas.classList.remove('show');
                    recordBtn.style.display = 'flex';
                    recordBtn.disabled = false;
                }
            }
        }

        // Add event listeners
        fetchBtn.addEventListener('click', fetchHelloWorld);
    </script>
</body>
</html>
